<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Tag in HTML (Form)</title>
</head>

<body>

    <!-- Form Tag -->
    <form action="">

        <!-- Input Tag -->
        Username: <input type="text" placeholder="Enter Text...">

        <br><br>

        Password: <input type="password" placeholder="Enter Password">
    </form>


</body>

</html>
