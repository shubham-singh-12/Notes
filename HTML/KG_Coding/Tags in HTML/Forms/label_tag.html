<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name & Value in HTML (Form)</title>
</head>

<body>

    <form action="">

        <!-- Label Tag -->
        <label for="fname">First Name: </label>
        <input type="text" name="firstname" id="fname" placeholder="Enter First name..."><br><br>

        <label for="lname">Last Name: </label>
        <input type="text" name="lastname" id="lname" placeholder="Enter Last name..."><br><br>

        <label for="upass">Password: </label>
        <input type="password" name="userpassword" id="upass" placeholder="Enter Password...">
    </form>

</body>

</html>
