<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big / Small Tag in HTML</title>
</head>

<body>

    <!-- Big Tag -->
    <p>
        Lorem ipsum dolor <big>sit amet, consectetur adipisicing</big> elit. Accusantium, ipsa.
    </p>

    <!-- Small Tag -->
    <p>
        Lorem ipsum dolor sit <small>amet, consectetur adipisicing elit.</small> Non, architecto?
    </p>

</body>

</html>
