<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript / Superscript Tag in HTML</title>
</head>

<body>

    <!-- Subscript Tag -->
    <p>Chemical formula of Water is: H<sub>2</sub>O</p>

    <!-- Superscript Tag -->
    <p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p>

</body>

</html>
