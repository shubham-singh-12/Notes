<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption in HTML (Table)</title>
</head>

<body>

    <!-- Table Tag -->
    <table border="1">

        <!-- Caption -->
        <caption>Student Information</caption>

        <!-- <tr> -> Table Row-->
        <tr>
            <!-- <th> -> Table Head -->
            <th>Language</th>
            <th>Stars</th>
        </tr>

        <tr>
            <!-- <td> -> Actual Table Data -->
            <td>Python</td>
            <td>4</td>
        </tr>

        <tr>
            <td>JavaScript</td>
            <td>4.5</td>
        </tr>
    </table>

</body>

</html>
