<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag in HTML</title>
</head>

<body>

    <!-- Anchor Tag -->
    <a href="https://www.google.com">Google</a><br>

    <!-- Anchor Tag with Target attribute -->
    <!-- 1. target="_blank" -> Open Link in Same tab -->
    <a href="https://www.youtube.com" target="_blank">YouTube</a><br>

    <!-- 2. target="_self" -> Open Link in new Tab -->
    <a href="https://www.facebook.com" target="_self">Facebook</a><br>

    <!-- 3. target="_parent" -> Open Link in Parent Tab-->
    <a href="https://www.instagram.com" target="_parent">Instagram</a><br>

    <!-- 4. target="_top" -> Open Link at the top -->
    <a href="https://www.unsplash.com" target="_top">Unsplash</a><br>

</body>

</html>
