<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fieldset Tag in HTML</title>
</head>

<body>

    <!-- Fieldset Tag -->
    <fieldset>

        <!-- Legend Tag -->
        <legend>User Details</legend>

        <label for="uname">UserName: </label>
        <input type="text" name="userName" id="uname" placeholder="Enter your name...">

        <br><br>

        <label for="uname">Password: </label>
        <input type="password" name="userPassword" id="upass" placeholder="Enter your password...">
    </fieldset>

</body>

</html>
