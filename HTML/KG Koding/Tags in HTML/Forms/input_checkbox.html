<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Checkbox in HTML (Form)</title>
</head>

<body>

    <form action="">

        <!-- Input Checkbox -->
        <label for="forapple">Apple</label>
        <input type="checkbox" name="fruit" id="forapple" value="apple">

        <label for="forbanana">Banana</label>
        <input type="checkbox" name="fruit" id="forbanana" value="banana">

        <label for="forgrapes">Grapes</label>
        <input type="checkbox" name="fruit" id="forgrapes" value="grapes">
    </form>

</body>

</html>
