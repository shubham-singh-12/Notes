<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tr, td, th Tag in HTML</title>
</head>

<body>

    <!-- Table Tag -->
    <table border="1">

        <!-- <tr> -> Table Row-->
        <tr>
            <!-- <th> -> Table Head -->
            <th>Language</th>
            <th>Stars</th>
            <th>Years</th>
        </tr>

        <tr>
            <!-- <td> -> Actual Table Data -->
            <td>Python</td>
            <td>4</td>
            <td>3</td>
        </tr>

        <tr>
            <td>JavaScript</td>
            <td>4.5</td>
            <td>4</td>
        </tr>

        <tr>
            <td>Java</td>
            <td>3</td>
            <td>1</td>
        </tr>
    </table>

</body>

</html>
