<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calspan in HTML (Table)</title>
</head>

<body>

    <!-- Table Tag -->
    <table border="1">

        <tr>
            <th>Language</th>
            <th>Stars</th>
        </tr>

        <tr>
            <td>Python</td>
            <td>4</td>
        </tr>

        <tr>
            <td>JavaScript</td>
            <td>4.5</td>
        </tr>

        <tr>
            <!-- Colspan -->
            <td colspan="2">This cell span 2 Columns</td>
        </tr>
    </table>

</body>

</html>
