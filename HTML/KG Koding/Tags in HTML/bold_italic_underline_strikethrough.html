<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold / Italic / Underline / Strikethrough Tags in HTML</title>
</head>

<body>

    <!-- Bold Tag -->
    <p><b>Lorem ipsum dolor sit amet.</b></p>
    <hr>

    <!-- Italic Tag -->
    <p><i>Lorem ipsum dolor sit amet.</i></p>
    <hr>

    <!-- Underline Tag -->
    <p><u>Lorem ipsum dolor sit amet.</u></p>
    <hr>

    <!-- Strikethrough Tag -->
    <p><strike>Lorem ipsum dolor sit amet.</strike></p>
    <hr>

</body>

</html>
