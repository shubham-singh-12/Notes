<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Transform (Animation)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 50px;
            color: white;
            font-size: 20px;
            border: 2px solid black;
            background-color: crimson;

            position: absolute;

            /* Define Animation Property */
            animation-name: ghumakkad;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-delay: 0.5s;

            
            animation-iteration-count: infinite;
            animation-direction: alternate;

            /* Short-hand */
            /* animation: ghumakkad 2s ease-in-out 1s infinite alternate; */
        }

        /* Create Animation */
        @keyframes ghumakkad {
            from {
                left: 0%;
            }

            to {
                left: 80%;
            }
        }
    </style>
</head>

<body>

    <div class="box">Animation</div>

</body>

</html>
