<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Transform (Animation)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 50px;
            color: white;
            font-size: 20px;
            border: 2px solid black;
            background-color: crimson;

            position: absolute;

            /* Define Animation Property */
            animation-name: ghumakkad;
            animation-duration: 4s;
            animation-timing-function: ease-in-out;
            animation-delay: 0.5s;

            animation-iteration-count: infinite;
        }

        /* Create Animation */
        @keyframes ghumakkad {
            0% {
                left: 0%;
                top: 40%;
            }

            25% {
                left: 40%;
                top: 80%;
            }

            50% {
                left: 80%;
                top: 40%;
            }

            75% {
                left: 40%;
                top: 0%;
            }

            100% {
                left: 0%;
                top: 40%;
            }
        }
    </style>
</head>

<body>

    <div class="box">Animation</div>

</body>

</html>
