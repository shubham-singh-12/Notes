<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Transform (Skeq)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 50px;
            color: white;
            font-size: 20px;
            border: 2px solid black;
            background-color: crimson;
            transition: all 0.3s ease-in-out;
        }

        .box:hover {
            cursor: pointer;
            color: black;
            background-color: cyan;
            transform: skew(45deg);
        }
    </style>
</head>

<body>

    <div class="box">Skew</div>

</body>

</html>
