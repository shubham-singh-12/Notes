<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Transform (rotate)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 50px;
            color: white;
            font-size: 20px;
            border: 2px solid black;
            background-color: crimson;
            transition: all 0.2s ease-in-out;

            /* Normal -> Transform */
            /* transform: rotate(45deg); */
        }

        .box:hover {
            cursor: pointer;
            background-color: cyan;
            border-radius: 30px;
            transform: rotate(45deg);
        }
    </style>
</head>

<body>

    <div class="box">Rotate</div>

</body>

</html>
