<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Positions (Fixed)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #box1 {
            position: fixed;
            height: 100px;
            width: 100px;
            background-color: crimson;
            color: white;
            font-size: 20px;
            text-align: center;

            /* position: fixed -> allows us to use top, right, bottom, left, z-index. */
            top: 80px;
            left: 20px;
        }

        #box2 {
            height: 200px;
            width: 200px;
            background-color: seagreen;
            color: white;
            margin: 10px;
            text-align: center;
            font-size: 30px;
        }
    </style>
</head>

<body>

    <div id="box1">Fixed Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>
    <div id="box2">Demo Box</div>

</body>

</html>
