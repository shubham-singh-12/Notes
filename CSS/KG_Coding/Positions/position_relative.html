<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Positions (Relative)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: crimson;
            margin: 10px;
            color: white;
        }

        #box2 {
            position: relative;

            left: 100px;
            top: 150px;
        }
    </style>
</head>

<body>

    <div id="box2" class="box">Relative Box</div>

</body>

</html>
