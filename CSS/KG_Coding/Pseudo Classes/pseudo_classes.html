<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Pseudo Classes</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        button {
            margin: 20px;
            padding: 5px 10px;
            border-radius: 20px;
            background-color: black;
            color: white;
            font-size: 20px;
        }

        button:hover {
            cursor: pointer;
            background-color: white;
            color: black;
        }

        button:active{
            background-color: hotpink;
        }
    </style>
</head>

<body>

    <button>Click Me</button>

</body>

</html>
