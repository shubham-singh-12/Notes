<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- id & class Selector</title>
</head>

<!-- Internal CSS -->
<style>
    /* id Selector */
    #my-heading {
        color: coral;
    }

    /* class Selector */
    .my-paragraph {
        color: crimson;
    }
</style>

<body>

    <h1 id="my-heading">This is a Heading 1</h1>

    <p class="my-paragraph">Lorem ipsum dolor sit amet.</p>
</body>

</html>
