<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Descendant Selector</title>

<!-- Internal CSS -->
<style>
    /* Descendant Selector */
    div h1 {
        color: hotpink;
    }

    p {
        color: crimson;
    }
</style>

    <div>
        <h1>This is Heading 1</h1>
    </div>

    <p>Lorem ipsum dolor sit amet.</p>

</body>

</html>
