<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Visibility Prperty</title>

    <!-- Internal CSS -->
    <style>
        .box {
            height: 100px;
            width: 100px;
        }

        #box1 {
            background-color: coral;
            visibility: hidden;
        }

        #box2 {
            background-color: crimson;
        }
    </style>
</head>

<body>

    <div id="box1" class="box">Box 1</div>
    <div id="box2" class="box">Box 2</div>

</body>

</html>
