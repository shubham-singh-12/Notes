<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Text Align</title>

    <!-- Internal CSS -->
    <style>
        .box {
            height: 100px;
            width: 100px;
        }

        #box1 {
            background-color: crimson;
            text-align: left;
        }

        #box2 {
            background-color: cadetblue;
            text-align: center;
        }

        #box3 {
            background-color: chartreuse;
            text-align: right;
        }
    </style>
</head>

<body>

    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
    <div id="box3" class="box">Box3</div>

</body>

</html>
