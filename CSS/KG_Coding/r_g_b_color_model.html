<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - RGB Color Model</title>
</head>

<body>

    <!-- Applying Inline CSS -->
    <h1 style="background-color: rgb(255, 0, 0);">First</h1>
    <h2 style="background-color: rgb(0, 255, 0);">Second</h2>
    <h3 style="background-color: rgb(0, 0, 255);">Third</h3>
    <h4 style="background-color: rgb(122, 139, 46);">Fourth</h4>

</body>

</html>
