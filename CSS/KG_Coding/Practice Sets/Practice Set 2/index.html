<!DOCTYPE html>
<html lang="en">

<head>
    <title>Practice Set 2</title>

    <!-- Internal CSS -->
    <style>
        .box1 {
            height: 50px;
            width: 50px;
            background-color: rgb(255, 127, 80, 0.5);
        }

        .box2 {
            height: 50px;
            width: 50px;
            background-color: rgb(255, 127, 80, 0.5);
            color: blue;
        }

        .box3 {
            height: 100px;
            width: 100px;
            background-image: url('../../Myntra-Logo.jpg');
            background-size: contain;
            background-repeat: no-repeat;
        }

        .box4 {
            height: 200px;
            width: 400px;
            background: url('./example_image.jpg'), no-repeat, center;
        }
    </style>
</head>

<body>
    <!-- 1. Create a div bar with text and background color with opacity. -->
    <div class="box1">Div 1</div>



    <!-- ------------------------------------------------------ -->

    <!-- 2. Change the color of the main content. -->
    <div class="box2">Box 2</div>



    <!-- ------------------------------------------------------ -->
    <!-- 3. Add background image to one div. -->
    <div class="box3"></div>



    <!-- ------------------------------------------------------ -->
    <!-- 4. Use background shorthand property. -->
    <div class="box4"></div>

</body>

</html>
