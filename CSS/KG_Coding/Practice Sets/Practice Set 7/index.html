<!DOCTYPE html>
<html lang="en">

<head>
    <title>Practice Set 7</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .progress-container {
            height: 25px;
            width: 80%;
            border: 2px solid black;
            border-radius: 20px;

            position: absolute;
            top: 50px;
            left: 20px;
        }

        .progress-bar {
            background-color: cyan;
            height: 100%;
            border-radius: 20px;

            animation: progress 5s;
        }



        @keyframes progress {
            0% {
                width: 0%;
                background-color: crimson
            }

            90% {
                width: 95%;
                background-color: crimson
            }

            95% {
                width: 70%;
                background-color: crimson;
            }

            100% {
                width: 100%;
                background-color: crimson;
            }
        }
    </style>
</head>

<body>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>


</body>

</html>
