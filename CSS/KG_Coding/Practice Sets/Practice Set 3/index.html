<!DOCTYPE html>
<html lang="en">

<head>
    <title>Practice Set 3</title>

    <!-- Font Awesome CDN -->
    <script src="https://kit.fontawesome.com/c062ef08a6.js" crossorigin="anonymous"></script>


    <!-- Internal CSS -->
    <style>
        h1 {
            text-align: center;
            text-transform: capitalize;
        }

        * {
            font-family: 'Times New Roman', Times, serif;
        }

        #outer {
            height: 300px;
            width: 300px;
            background-color: crimson;
            font-size: 25px;
        }

        #inner {
            height: 200px;
            width: 200px;
            background-color: coral;
            font-size: 10px;
        }

        i {
            font-size: 30px;
        }
    </style>
</head>

<body>

    <!-- ------------------------------------------------------ -->
    <!-- 1. Create a heading at the center and make capitalized. -->
    <h1>heading</h1>



    <!-- ------------------------------------------------------ -->
    <!-- 2. Use font family for the whole page to time New Roman. -->

    <h1>Heading 1</h1>

    <p>Lorem ipsum dolor sit amet.</p>



    <!-- ------------------------------------------------------ -->
    <!-- 3. Create one div inside another div. 
>       - Set id and text outer to outer div, 
>       - Set id and text inner to inner div.
>       - Set outer div text size to 25px.
>       - Set inner to 10px. -->

    <div id="outer">
        outer
        <div id="inner">
            Inner
        </div>
    </div>



    <!-- ------------------------------------------------------ -->
    <!-- 4. Use icons from fontawesome.com and use icons of LinkedIn and GitHub. -->
    <i class="fa-brands fa-linkedin"></i>
    <i class="fa-brands fa-github"></i>
</body>

</html>
