<!DOCTYPE html>
<html lang="en">

<head>
    <title>Practice set 1</title>

    <!-- Internal CSS -->
    <style>
        #heading {
            color: cyan;
        }

        .my-para {
            color: seagreen;
        }

        div {
            color: darkcyan;
        }

        #my-heading {
            color: sienna;
        }

        #first, #second {
            color: yellowgreen;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- 1. Create a heading and set the text colore red. -->
    <h1>This is Practice Set 1</h1>



    <!-- ------------------------------------------------------ -->



    <!-- 2. Create a div with id #heading, include CSS using all 3 ways line, style tag, and external, and observe priority. -->

    <div id="heading">
        <h1 style="color: crimson;">This is a Heading</h1>
    </div>



    <!-- ------------------------------------------------------ -->



    <!-- 3. Add comments to your CSS Class. -->
    <h1 class="my-heading">Heading 1</h1>



    <!-- ------------------------------------------------------ -->



    <!-- 4. Create a div, paragraph, and heading and use id selector, element selector and class selector for them. -->
    <div>
        This is a div
    </div>

    <h1 id="my-heading">Heading 1</h1>

    <p class="my-para">
        Lorem ipsum dolor sit amet.
    </p>



    <!-- ------------------------------------------------------ -->



    <!-- 5. Create two div with id first and second and define color for both using group selector. -->
    <div id="first">This is First div</div>
    <div id="second">This is Second div</div>

</body>

</html>
