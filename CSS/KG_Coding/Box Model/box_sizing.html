<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Box Model (Box Sizing)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        button {
            height: 100px;
            width: 100px;
            border: 5px solid black;
            background-color: crimson;
            color: greenyellow;
        }

        #my-button_1 {
            box-sizing: content-box;
        }

        #my-button_2 {
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <button id="my-button_1">Click Me</button> <br><br>
    <button id="my-button_2">Click Me</button>

</body>

</html>
