<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Box Model (Padding)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #my-padding {
            background-color: springgreen;
            font-size: 15px;
            height: 50px;
            width: 100px;
            padding: 10px 10px 10px 10px;
        }
    </style>
</head>

<body>

    <div id="my-padding">
        Lorem ipsum dolor sit amet.
    </div>

</body>

</html>
