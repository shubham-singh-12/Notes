<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Box Model (Border Radius)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #my-button {
            height: 100px;
            width: 100px;
            background-color: crimson;
            border-radius: 10px;        /* border-radius: 10px 10px 10px 10px. */
        }
    </style>
</head>

<body>

    <button id="my-button">Click Me</button>

</body>

</html>
