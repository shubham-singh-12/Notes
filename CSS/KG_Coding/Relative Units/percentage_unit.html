<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Relative Units (Percentage)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #first {
            width: 200px;
            height: 100px;
            background-color: crimson;
        }

        #second {
            width: 50%;
            height: 60%;
            background-color: lightskyblue;
        }
    </style>
</head>

<body>

    <div id="first">
        First div
        <div id="second">
            Second div
        </div>
    </div>

</body>

</html>
