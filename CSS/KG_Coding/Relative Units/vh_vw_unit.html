<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Relative Units (vh, vw)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #first {
            width: 50vw;
            height: 90vh;
            background-color: crimson;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div id="first">First div</div>

</body>

</html>
