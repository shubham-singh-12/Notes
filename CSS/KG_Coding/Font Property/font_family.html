<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Font Family</title>

    <!-- Internal CSS -->
    <style>
        #my-para {
            font-family: 'Courier New', Courier, monospace;
        }

        #my-para-2 {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>

<body>

    <p id="my-para">Lorem ipsum dolor sit amet.</p>

    <p id="my-para-2">Lorem ipsum dolor sit amet.</p>

</body>

</html>
