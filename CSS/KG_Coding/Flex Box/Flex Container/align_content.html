<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Flex Box (Align-content -> start, end, center, space-around, space-evenly, space-between, etc..)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #container {
            height: 500px;
            width: 500px;
            border: 5px solid black;
            margin: 10px;
            background-color: lavender;

            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;

            align-content: space-evenly;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 10px;
            color: white;
            border: 4px solid black;
        }

        #box1 {
            background-color: crimson;
        }

        #box2 {
            background-color: blue;
        }

        #box3 {
            background-color: cornflowerblue;
        }

        #box4 {
            background-color: darkcyan;
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="box1" class="box">Box 1</div>
        <div id="box2" class="box">Box 2</div>
        <div id="box3" class="box">Box 3</div>
        <div id="box4" class="box">Box 4</div>
        <div id="box4" class="box">Box 5</div>
        <div id="box4" class="box">Box 6</div>
        <div id="box4" class="box">Box 7</div>
        <div id="box4" class="box">Box 8</div>
    </div>

</body>

</html>
