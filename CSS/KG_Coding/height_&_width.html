<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Height & Width</title>

    <!-- Internal CSS -->
    <style>
        .box {
            height: 60px;
            width: 60px;
        }

        #box1 {
            background-color: crimson;
        }

        #box2 {
            background-color: cornflowerblue;
        }

        #box3 {
            background-color: coral;
        }
    </style>
</head>

<body>

    <div id="box1" class="box">Box 1</div>
    <div id="box2" class="box">Box 2</div>
    <div id="box3" class="box">Box 3</div>

</body>

</html>
