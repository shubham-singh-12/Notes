<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS - Display Property (Block)</title>
    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 10px;
            border: 3px solid black;
            display: block;
        }

        #box1 {
            background-color: crimson;
        }

        #box2 {
            background-color: lightseagreen;
        }
    </style>
</head>

<body>

    <div id="box1" class="box">Box 1</div>
    <div id="box2" class="box">Box 2</div>

</body>

</html>
