<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Text Transform</title>

    <!-- Internal CSS -->
    <style>
        #box1 {
            text-transform: uppercase;
        }

        #box2 {
            text-transform: lowercase;
        }

        #box3 {
            text-transform: capitalize;
        }
    </style>
</head>

<body>

    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
    <div id="box3" class="box">Box3</div>

</body>

</html>
