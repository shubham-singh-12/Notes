<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Media Queries (max-width)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        .box {
            height: 100px;
            width: 100px;
            margin: 20px;
            background-color: crimson;
        }

        /* Apply Media Query */
        @media screen and (max-width: 400px) {
            .box {
                border: 2px solid hotpink;
                border: 5px solid cadetblue;
            }
        }
    </style>
</head>

<body>

    <div class="box">Box</div>

</body>

</html>
