<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS -- Grid (grid-row-start & end)</title>

    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: white;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-size: 30px;
            text-align: center;
        }

        main {
            height: 100%;
            width: 100%;
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 10% 40% 40% 10%;
        }

        header {
            background-color: lightseagreen;
            grid-column: 1 / 3;

            /* grid-row */
            grid-row-start: 1;
            grid-row-end: 2;

            /* Short-hand */
            /* grid-row: 1 / 2; */
        }

        .leftTop {
            background-color: blueviolet;
            grid-column: 1 / 2;

            /* grid-row */
            grid-row-start: 2;
            grid-row-end: 3;

            /* Short-hand */
            /* grid-row: 2 / 3; */
        }

        .leftBottom {
            background-color: rgb(26, 19, 225);
            grid-column: 1 / 2;

            /* grid-row */
            grid-row-start: 3;
            grid-row-end: 4;

            /* Short-hand */
            /* grid-row: 3 / 4; */
        }

        .right {
            background-color: firebrick;
            grid-column: 2 / 3;

            /* grid-row */
            grid-row-start: 2;
            grid-row-end: 4;

            /* Short-hand */
            /* grid-row: 2 / 4; */
        }

        footer {
            background-color: mediumseagreen;
            grid-column: 1 / 3;

            /* grid-row */
            grid-row-start: 4;
            grid-row-end: 5;

            /* Short-hand */
            /* grid-row: 4 / 5; */
        }
    </style>
</head>

<body>

    <main>
        <header>Header</header>

        <div class="leftTop">Left Top</div>
        <div class="leftBottom">Left Bottom</div>
        <div class="right">Right</div>

        <footer>Footer</footer>
    </main>

</body>

</html>
